<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | DevAgency</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/all.min.css">
</head>
<body>
  <nav class="navbar">
  <div class="container flex-nav">
    <div class="logo">DEV<span>AGENCY</span></div>
    <div class="right-buttons">
      <div class="menu-toggle" id="mobile-menu"><i class="fa-solid fa-bars"></i><a href="index.html">Back</a></div>
    </div>
  </div>
</nav>
  <section class="section" id="contact-section">
    <div class="container">
      <h2 class="section-header">Contact Us</h2>
      <div class="contact-box">
        <form id="contact-form">
          <input type="text" id="contact-name" placeholder="Your Name" required>
          <input type="email" id="contact-email" placeholder="Your Email" required>
          <input type="tel" id="contact-phone" placeholder="Phone Number" required>
          <textarea id="contact-message" placeholder="Your Message" required></textarea>
          <!-- Honeypot field for spam -->
          <input type="text" id="honeypot" style="display:none">
          <button type="submit" id="contact-btn">Send Message</button>
        </form>
      </div>
    </div>
  </section>
  <!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>© 2026 DevAgency Global. All Rights Reserved.</p>
  </div>
</footer>

<!-- SCRIPTS -->
<script src="js/tsparticles.min.js"></script>
<script src="js/particles-config.js"></script>
<script src="js/email.min.js"></script>
<script src="js/contact.js"></script>
<script src="js/anti-copy.js"></script>
<script>
  const slider = document.querySelector('.testimonials-slider');
  const nextBtn = document.querySelector('.arrow.right');
  const prevBtn = document.querySelector('.arrow.left');

  const scrollStep = 290;

  nextBtn.addEventListener('click', () => {
    slider.scrollBy({
      left: scrollStep,
      behavior: 'smooth'
    });
  });

  prevBtn.addEventListener('click', () => {
    slider.scrollBy({
      left: -scrollStep,
      behavior: 'smooth'
    });
  });
</script>
<script>
  let autoScroll;
  const startAuto = () => {
    autoScroll = setInterval(() => {
      slider.scrollBy({ left: 290, behavior: 'smooth' });
    }, 5000);
  };

  const stopAuto = () => clearInterval(autoScroll);

  startAuto();

  nextBtn.addEventListener('click', () => {
    stopAuto();
    slider.scrollBy({ left: 290, behavior: 'smooth' });
    startAuto();
  });

  prevBtn.addEventListener('click', () => {
    stopAuto();
    slider.scrollBy({ left: -290, behavior: 'smooth' });
    startAuto();
  });
</script>
  <!-- Scripts -->
  <script src="js/email.min.js"></script>
  <script>
    // ==============================
// DEVAGENCY CONTACT FORM JS
// ==============================

emailjs.init("B0TUfCsEZ03eoI5wF"); // Use same public key for consistency

const contactForm = document.getElementById("contact-form");
const contactBtn = document.getElementById("contact-btn");
const HONEYPOT_ID = "honeypot";
const formLoadedAt = Date.now();

// ==============================
// LIVE VALIDATION
// ==============================
function validateContactForm() {
  const name = document.getElementById("contact-name").value.trim();
  const email = document.getElementById("contact-email").value.trim();
  const phone = document.getElementById("contact-phone").value.trim();
  const message = document.getElementById("contact-message").value.trim();
  contactBtn.disabled = !(name && email && phone && message);
}

// Attach validation listeners
["contact-name", "contact-email", "contact-phone", "contact-message"].forEach(id =>
  document.getElementById(id).addEventListener("input", validateContactForm)
);
contactBtn.disabled = true;

// ==============================
// SEND EMAIL
// ==============================
function sendEmail(templateId, params, onSuccess) {
  emailjs.send("service_q4vtlp9", templateId, params)
    .then(() => {
      showToast("Message sent successfully!");
      if (typeof onSuccess === "function") onSuccess();
    })
    .catch(err => {
      console.error("EmailJS Error:", err);
      showToast("Failed to send message. Try again.");
      contactBtn.disabled = false;
      contactBtn.textContent = "Send Message";
    });
}

// ==============================
// FORM SUBMIT
// ==============================
contactForm.addEventListener("submit", function (e) {
  e.preventDefault();

  const honeypot = document.getElementById(HONEYPOT_ID)?.value;
  if (honeypot) return;

  if ((Date.now() - formLoadedAt) < 5000) return; // Spam bot check

  const name = document.getElementById("contact-name").value.trim();
  const email = document.getElementById("contact-email").value.trim();
  const phone = document.getElementById("contact-phone").value.trim();
  const message = document.getElementById("contact-message").value.trim();

  if (!name || !email || !phone || !message) {
    showToast("Please fill all required fields!");
    return;
  }

  contactBtn.disabled = true;
  contactBtn.textContent = "Sending...";

  const adminParams = {
    client_name: name,
    client_email: email,
    client_phone: phone,
    client_message: message
  };

  sendEmail("template_17uznij", adminParams, () => {
    // Auto-reply
    emailjs.send("service_q4vtlp9", "template_vs8zr8y", { client_name: name, client_email: email });

    contactForm.reset();
    contactBtn.textContent = "Send Message";
    contactBtn.disabled = true;
  });
});

// ==============================
// TOAST FUNCTION
// ==============================
const toast = document.getElementById("toast");
function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 3000);
}
  </script>
  <script src="js/anti-copy.js"></script>
</body>
</html>
